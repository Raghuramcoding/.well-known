<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Number Racer RPG</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Arial', sans-serif; background: #222; color: white; overflow: hidden; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .menu { pointer-events: auto; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; display: none; }
        #hud { position: absolute; top: 20px; left: 20px; font-size: 20px; }
        #math-prompt { position: absolute; top: 20px; width: 100%; text-align: center; font-size: 40px; color: yellow; }
        .btn { background: #4CAF50; color: white; border: none; padding: 10px 20px; margin: 5px; cursor: pointer; font-size: 16px; border-radius: 5px; }
        #world-map { display: block; } /* Start with the map */
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="world-map" class="menu">
            <h1>Global Number Racer</h1>
            <p>Select your destination:</p>
            <button class="btn" onclick="startRace('New York', 0x333333)">USA (City)</button>
            <button class="btn" onclick="startRace('Amazon', 0x228B22)">Brazil (Jungle)</button>
            <button class="btn" onclick="openShop()">Visit RPG Shop</button>
        </div>

        <div id="shop" class="menu">
            <h1 id="shop-title">Local Shop</h1>
            <p>Your Points: <span id="shop-points">0</span></p>
            <button class="btn" onclick="buyUpgrade('speed')">Better Engine (50 pts)</button>
            <button class="btn" onclick="closeShop()">Back to Map</button>
        </div>

        <div id="hud">Points: <span id="points">0</span> | Speed: <span id="speed-stat">0</span></div>
        <div id="math-prompt"></div>
    </div>

    <script>
        // --- GAME DATA (The RPG "Brain") ---
        let gameData = {
            points: 0,
            speedMultiplier: 1,
            currentLocation: "USA",
            isRacing: false
        };

        // --- 3D ENGINE SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Create a 3D Car
        const carGroup = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(1, 0.5, 2), new THREE.MeshPhongMaterial({color: 0xff0000}));
        carGroup.add(body);
        scene.add(carGroup);

        // Add Light
        const light = new THREE.PointLight(0xffffff, 1, 100);
        light.position.set(0, 5, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        camera.position.z = 5;
        camera.position.y = 2;
        camera.lookAt(carGroup.position);

        // --- GAME FUNCTIONS ---
        function startRace(location, groundColor) {
            gameData.currentLocation = location;
            gameData.isRacing = true;
            document.getElementById('world-map').style.display = 'none';
            
            // Change track color based on country
            scene.background = new THREE.Color(groundColor);
            generateMathProblem();
        }

        function generateMathProblem() {
            if(!gameData.isRacing) return;
            const num1 = Math.floor(Math.random() * 10);
            const num2 = Math.floor(Math.random() * 10);
            const ans = num1 + num2;
            document.getElementById('math-prompt').innerText = `${num1} + ${num2} = ?`;
            
            // In a real game, you'd type the answer. Here, we simulate a "speed boost"
            setTimeout(() => {
                gameData.points += 10;
                updateUI();
                generateMathProblem();
            }, 3000);
        }

        function openShop() {
            document.getElementById('world-map').style.display = 'none';
            document.getElementById('shop').style.display = 'block';
            document.getElementById('shop-points').innerText = gameData.points;
        }

        function closeShop() {
            document.getElementById('shop').style.display = 'none';
            document.getElementById('world-map').style.display = 'block';
        }

        function buyUpgrade(type) {
            if (gameData.points >= 50) {
                gameData.points -= 50;
                gameData.speedMultiplier += 0.5;
                alert("Upgraded! Your car is now faster.");
                updateUI();
                document.getElementById('shop-points').innerText = gameData.points;
            } else {
                alert("Not enough points! Win more races.");
            }
        }

        function updateUI() {
            document.getElementById('points').innerText = gameData.points;
            document.getElementById('speed-stat').innerText = (gameData.speedMultiplier * 10).toFixed(0);
        }

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            if(gameData.isRacing) {
                carGroup.rotation.y += 0.01 * gameData.speedMultiplier; // Spin faster as you level up!
            }
            renderer.render(scene, camera);
        }
        animate();

        // Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
