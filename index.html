<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ultimate Coding Voyage</title>
    <style>
        /* 2020s: Glassmorphism and Deep Ocean Gradients */
        :root {
            --glass: rgba(0, 255, 255, 0.1);
            --neon-green: #00ff00;
            --cyber-blue: #00ccff;
        }

        body {
            margin: 0;
            /* 2020s Gradient */
            background: linear-gradient(135deg, #001a1a, #003366, #000000);
            color: white;
            font-family: 'Segoe UI', sans-serif; 
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 90s: Scrolling Marquee with Green/Blue theme */
        .top-banner {
            width: 100%;
            background: #000080; /* Classic Navy */
            color: var(--neon-green);
            font-weight: bold;
            padding: 8px 0;
            border-bottom: 3px solid var(--cyber-blue);
            font-family: 'Courier New', monospace;
        }

        header {
            padding: 50px 20px;
            text-align: center;
        }

        /* 2010s Style Header with 90s Shadow */
        header h1 {
            font-size: 3.5rem;
            color: var(--cyber-blue);
            text-shadow: 3px 3px 0px #005500; 
        }

        /* 2020s: Modern Glass Card Container */
        .container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            width: 85%;
            max-width: 900px;
            box-shadow: 0 0 30px rgba(0, 204, 255, 0.2);
        }

        .project-grid {
            display: flex;
            gap: 25px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        /* 90s/2000s: The "Beveled" Windows Button (Green Edition) */
        .retro-card {
            background: #c0c0c0; 
            color: black;
            border-top: 4px solid #ffffff;
            border-left: 4px solid #ffffff;
            border-right: 4px solid #444444;
            border-bottom: 4px solid #444444;
            padding: 15px;
            width: 260px;
        }

        .retro-card h3 {
            background: linear-gradient(90deg, #000080, #008080); /* Blue to Teal title bar */
            color: white;
            padding: 4px 10px;
            margin: -15px -15px 15px -15px;
            font-size: 0.9rem;
            font-family: sans-serif;
        }

        /* 2020s: Glowing Green Play Button */
        .play-btn {
            display: block;
            margin-top: 15px;
            padding: 12px;
            background: var(--neon-green);
            color: black;
            text-decoration: none;
            text-align: center;
            font-weight: bold;
            border-radius: 5px; /* Blocky 2000s shape but 2020s glow */
            transition: 0.2s;
            box-shadow: 0 0 10px var(--neon-green);
        }

        .play-btn:hover {
            transform: translateY(-3px);
            background: white;
            box-shadow: 0 0 20px white;
        }

            animation: blinker 1s linear infinite;
            color: #0000ff;
